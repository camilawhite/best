<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이은성 고객님 보장 분석 리포트</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Framer Motion -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Recharts -->
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide-react@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;900&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        /* Custom Scrollbar for mobile scroll area */
        .overflow-y-auto::-webkit-scrollbar {
            width: 4px;
        }
        .overflow-y-auto::-webkit-scrollbar-track {
            background: transparent;
        }
        .overflow-y-auto::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const { motion, AnimatePresence } = FramerMotion;
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Cell, PieChart, Pie, Label 
        } = Recharts;
        const { 
            ChevronLeft, ChevronRight, AlertCircle, TrendingUp, Activity, Brain, Heart, ShieldCheck, 
            CheckCircle2, Info, ArrowRight, Target, Zap 
        } = LucideReact;

        // --- Utility ---
        function cn(...classes) {
            return classes.filter(Boolean).join(' ');
        }

        // --- Components ---
        const ProgressBar = ({ current, total }) => (
            <div className="fixed top-0 left-0 w-full h-1.5 bg-slate-100 z-50">
                <motion.div 
                    className="h-full bg-blue-600"
                    initial={{ width: 0 }}
                    animate={{ width: `${((current + 1) / total) * 100}%` }}
                    transition={{ duration: 0.3 }}
                />
            </div>
        );

        function App() {
            const [currentSlide, setCurrentSlide] = useState(0);
            const [direction, setDirection] = useState(0);
            const [isMobile, setIsMobile] = useState(false);

            useEffect(() => {
                const checkMobile = () => setIsMobile(window.innerWidth < 768);
                checkMobile();
                window.addEventListener('resize', checkMobile);
                return () => window.removeEventListener('resize', checkMobile);
            }, []);

            const nextSlide = () => {
                if (currentSlide < slides.length - 1) {
                    setDirection(1);
                    setCurrentSlide(prev => prev + 1);
                }
            };

            const prevSlide = () => {
                if (currentSlide > 0) {
                    setDirection(-1);
                    setCurrentSlide(prev => prev - 1);
                }
            };

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'ArrowRight' || e.key === ' ') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide]);

            // --- Data ---
            const deathCauseData = [
                { name: '암', value: 24.8, color: '#ef4444' },
                { name: '심장질환', value: 10.5, color: '#3b82f6' },
                { name: '폐렴', value: 8.9, color: '#94a3b8' },
                { name: '뇌혈관질환', value: 7.2, color: '#8b5cf6' },
                { name: '자살', value: 4.6, color: '#cbd5e1' },
            ];

            const cancerCostData = [
                { name: '현재 진단비', cost: 2000, fill: '#94a3b8' },
                { name: '항암치료', cost: 6400, fill: '#ef4444' },
                { name: '로봇수술+재건', cost: 3500, fill: '#f59e0b' },
            ];

            const heartCoverageData = [
                { name: '보장 가능 (급성심근경색)', value: 11.8, fill: '#3b82f6' },
                { name: '보장 불가 (협심증 등)', value: 88.2, fill: '#e2e8f0' },
            ];

            const brainCoverageData = [
                { name: '보장 가능 (뇌졸중)', value: 66.9, fill: '#8b5cf6' },
                { name: '보장 불가 (뇌동맥류 등)', value: 33.1, fill: '#e2e8f0' },
            ];

            const slides = [
                {
                    id: 0,
                    title: "이은성 고객님의 보장 분석 결과",
                    subtitle: "뇌·심장·암, 텅 빈 보장의 사각지대를 찾아라",
                    content: (
                        <div className="text-center space-y-12 max-w-4xl">
                            <motion.div 
                                initial={{ scale: 0.5, opacity: 0, rotate: -10 }}
                                animate={{ scale: 1, opacity: 1, rotate: 0 }}
                                transition={{ type: "spring", damping: 12 }}
                                className="inline-block p-6 md:p-8 rounded-[2rem] md:rounded-[2.5rem] bg-gradient-to-br from-blue-600 to-blue-800 text-white shadow-2xl shadow-blue-200 mb-4"
                            >
                                <ShieldCheck size={60} className="md:w-20 md:h-20" />
                            </motion.div>
                            <div className="space-y-4 md:space-y-6">
                                <motion.div
                                    initial={{ y: 20, opacity: 0 }}
                                    animate={{ y: 0, opacity: 1 }}
                                    transition={{ delay: 0.3 }}
                                >
                                    <h2 className="text-xl md:text-3xl font-bold text-slate-800 leading-tight px-4">
                                        통계로 증명하는 <span className="text-blue-600">100% 안심 보장</span> 솔루션
                                    </h2>
                                </motion.div>
                            </div>
                            <motion.div 
                                initial={{ y: 20, opacity: 0 }}
                                animate={{ y: 0, opacity: 1 }}
                                transition={{ delay: 0.5 }}
                                className="pt-4 md:pt-8 flex justify-center"
                            >
                                <button 
                                    onClick={nextSlide}
                                    className="group flex items-center gap-2 md:gap-3 px-8 py-3 md:px-10 md:py-4 bg-slate-900 text-white rounded-full font-bold hover:bg-blue-600 transition-all shadow-xl hover:scale-105 active:scale-95 text-sm md:text-base mx-auto"
                                >
                                    분석 리포트 시작하기
                                    <ArrowRight size={18} className="group-hover:translate-x-1 transition-transform md:w-5 md:h-5" />
                                </button>
                            </motion.div>
                        </div>
                    )
                },
                {
                    id: 1,
                    title: "대한민국 사망 원인 분석",
                    subtitle: "통계청 2024년 사망원인통계 결과",
                    content: (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 w-full max-w-6xl items-center">
                            <div className="h-[300px] md:h-[400px] w-full bg-white p-4 md:p-6 rounded-3xl border border-slate-100 shadow-sm">
                                <h4 className="text-[10px] md:text-sm font-bold text-slate-400 mb-4 md:mb-6 uppercase tracking-wider">사망 원인별 비중 (%)</h4>
                                <ResponsiveContainer width="100%" height="100%">
                                    <BarChart data={deathCauseData} layout="vertical" margin={{ left: isMobile ? 0 : 20, right: 40 }}>
                                        <XAxis type="number" hide />
                                        <YAxis 
                                            dataKey="name" 
                                            type="category" 
                                            axisLine={false} 
                                            tickLine={false} 
                                            width={isMobile ? 70 : 100}
                                            tick={{ fill: '#475569', fontWeight: 600, fontSize: isMobile ? 12 : 14 }}
                                        />
                                        <Tooltip 
                                            cursor={{ fill: '#f8fafc' }}
                                            contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)' }}
                                        />
                                        <Bar dataKey="value" radius={[0, 10, 10, 0]} barSize={isMobile ? 24 : 32}>
                                            {deathCauseData.map((entry, index) => (
                                                <Cell key={`cell-${index}`} fill={entry.color} />
                                            ))}
                                        </Bar>
                                    </BarChart>
                                </ResponsiveContainer>
                            </div>
                            <div className="space-y-8">
                                <div className="bg-red-50 p-6 md:p-8 rounded-3xl border-l-8 border-red-500 shadow-sm">
                                    <div className="flex items-center gap-3 text-red-600 mb-3 md:mb-4">
                                        <AlertCircle size={24} className="md:w-8 md:h-8" />
                                        <h3 className="text-xl md:text-2xl font-black">압도적 1위: 암</h3>
                                    </div>
                                    <p className="text-sm md:text-lg text-slate-700 leading-relaxed">
                                        전체 사망자의 <span className="text-red-600 font-black text-2xl md:text-3xl">24.8%</span>가 암으로 발생합니다. 
                                        4명 중 1명은 암이라는 거대한 위험에 노출되어 있습니다.
                                    </p>
                                </div>
                                <div className="bg-blue-50 p-6 md:p-8 rounded-3xl border-l-8 border-blue-500 shadow-sm">
                                    <div className="flex items-center gap-3 text-blue-600 mb-3 md:mb-4">
                                        <Activity size={24} className="md:w-8 md:h-8" />
                                        <h3 className="text-xl md:text-2xl font-black">혈관 질환의 위협</h3>
                                    </div>
                                    <p className="text-sm md:text-lg text-slate-700 leading-relaxed">
                                        심장 및 뇌혈관 질환은 암과 함께 한국인 3대 사인으로, 
                                        <span className="text-blue-600 font-black"> 실질적인 보장 범위</span> 확인이 생사와 직결됩니다.
                                    </p>
                                </div>
                            </div>
                        </div>
                    )
                },
                {
                    id: 2,
                    title: "주제 1. 암 – 진단비보다 무서운 치료비",
                    content: (
                        <div className="w-full max-w-6xl space-y-10">
                            <motion.div 
                                initial={{ opacity: 0, y: -10 }}
                                animate={{ opacity: 1, y: 0 }}
                                className="bg-red-600 text-white px-4 py-1.5 md:px-6 md:py-2 rounded-full inline-block font-black text-sm sm:text-base md:text-xl shadow-lg shadow-red-200 mb-4"
                            >
                                진단비 2,000만 원으로 최신 항암 치료가 가능할까요?
                            </motion.div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-10 items-center">
                                <div className="h-[280px] md:h-[350px] bg-white p-6 md:p-8 rounded-3xl border border-slate-100 shadow-sm">
                                    <h4 className="text-[10px] md:text-sm font-bold text-slate-400 mb-4 md:mb-6 uppercase tracking-wider">치료 비용 비교 (단위: 만 원)</h4>
                                    <ResponsiveContainer width="100%" height="100%">
                                        <BarChart data={cancerCostData} margin={{ top: 20, right: 30, left: 0, bottom: 0 }}>
                                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#f1f5f9" />
                                            <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fill: '#64748b', fontSize: isMobile ? 10 : 12 }} />
                                            <YAxis hide />
                                            <Tooltip 
                                                cursor={{ fill: '#f8fafc' }}
                                                contentStyle={{ borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)' }}
                                            />
                                            <Bar dataKey="cost" radius={[10, 10, 0, 0]} barSize={isMobile ? 40 : 60}>
                                                {cancerCostData.map((entry, index) => (
                                                    <Cell key={`cell-${index}`} fill={entry.fill} />
                                                ))}
                                            </Bar>
                                        </BarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="space-y-6">
                                    <div className="p-5 md:p-6 bg-slate-900 text-white rounded-3xl relative overflow-hidden shadow-xl">
                                        <div className="relative z-10">
                                            <div className="flex items-center gap-2 text-red-400 mb-2">
                                                <Zap size={18} className="md:w-5 md:h-5" fill="currentColor" />
                                                <span className="font-bold uppercase tracking-widest text-[10px] md:text-xs">Shocking Reality</span>
                                            </div>
                                            <h4 className="text-xl md:text-2xl font-black mb-3 md:mb-4">키트루다 연간 치료비: 6,400만 원</h4>
                                            <p className="text-sm md:text-base text-slate-400 leading-relaxed">
                                                고객님의 현재 진단비 <span className="text-white font-bold">2,000만 원</span>은 
                                                최신 면역항암제 치료를 시작하기에도 턱없이 부족한 금액입니다.
                                            </p>
                                        </div>
                                        <div className="absolute -bottom-10 -right-10 w-40 h-40 bg-blue-600/20 rounded-full blur-3xl" />
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 md:gap-4">
                                        <div className="p-4 md:p-5 bg-blue-50 rounded-2xl border border-blue-100">
                                            <h5 className="font-bold text-blue-700 mb-1 text-xs md:text-sm">로봇 수술</h5>
                                            <p className="text-lg md:text-2xl font-black text-slate-800">약 1,500만~</p>
                                            <p className="text-[10px] text-slate-500 mt-1">다빈치 로봇 수술 기준</p>
                                        </div>
                                        <div className="p-4 md:p-5 bg-amber-50 rounded-2xl border border-amber-100">
                                            <h5 className="font-bold text-amber-700 mb-1 text-xs md:text-sm">표적 항암</h5>
                                            <p className="text-lg md:text-2xl font-black text-slate-800">약 3,000만~</p>
                                            <p className="text-[10px] text-slate-500 mt-1">비급여 약제 사용 시</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-blue-600 text-white p-4 md:p-6 rounded-2xl flex items-center justify-between shadow-lg shadow-blue-200">
                                <div className="flex items-center gap-3 md:gap-4">
                                    <div className="p-2 md:p-3 bg-white/20 rounded-xl">
                                        <Target size={24} className="md:w-7 md:h-7" />
                                    </div>
                                    <div>
                                        <p className="font-bold text-sm md:text-lg">솔루션: 암 주요 치료비 보완</p>
                                        <p className="text-blue-100 text-[10px] md:text-sm">1회성 진단비가 아닌, 치료할 때마다 반복 지급되는 보장이 핵심입니다.</p>
                                    </div>
                                </div>
                                <CheckCircle2 size={24} className="text-blue-200 hidden sm:block" />
                            </div>
                        </div>
                    )
                },
                {
                    id: 3,
                    title: "핵심 2대 질병 보장 범위 및 질환 코드",
                    subtitle: "질환별 포함 범위와 지급 예시를 상세히 확인하십시오",
                    content: (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 w-full max-w-6xl">
                            <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm space-y-4 flex flex-col">
                                <div className="flex justify-between items-center border-b pb-2">
                                    <h4 className="text-lg md:text-xl font-black text-slate-800 flex items-center gap-2">
                                        <Brain size={20} className="text-purple-500 md:w-6 md:h-6" /> 뇌혈관질환
                                    </h4>
                                    <span className="text-[8px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Brain Disease Codes</span>
                                </div>
                                <div className="space-y-2 flex-1">
                                    <div className="p-2 md:p-3 bg-slate-900 text-white rounded-xl flex justify-between items-center shadow-md">
                                        <span className="font-bold text-xs md:text-base">뇌혈관질환 전체</span>
                                        <span className="bg-blue-600 px-2 py-0.5 rounded text-[10px] md:text-xs font-black">100%</span>
                                    </div>
                                    <div className="ml-2 md:ml-4 p-2 md:p-3 bg-blue-50 border border-blue-100 rounded-xl flex justify-between items-center">
                                        <span className="font-bold text-blue-700 text-xs md:text-base">뇌졸중</span>
                                        <span className="text-blue-600 font-bold text-xs md:text-base">66.9%</span>
                                    </div>
                                    <div className="ml-4 md:ml-8 p-2 md:p-3 bg-red-50 border border-red-100 rounded-xl flex justify-between items-center">
                                        <span className="font-bold text-red-700 text-xs md:text-base">뇌출혈</span>
                                        <span className="text-red-600 font-bold text-xs md:text-base">9.1%</span>
                                    </div>
                                    <div className="mt-3 md:mt-4 grid grid-cols-2 gap-x-2 gap-y-1 text-[9px] md:text-[10px] text-slate-500 bg-slate-50 p-3 md:p-4 rounded-2xl border border-slate-100">
                                        <div className="flex gap-1"><span>I60</span> <span>거미막밑 출혈</span></div>
                                        <div className="flex gap-1"><span>I61</span> <span>뇌내출혈</span></div>
                                        <div className="flex gap-1"><span>I62</span> <span>기타 비외상성 출혈</span></div>
                                        <div className="flex gap-1 font-bold text-blue-600"><span>I63</span> <span>뇌경색증 (44.4%)</span></div>
                                        <div className="flex gap-1"><span>I65</span> <span>뇌전동맥 폐쇄/협착</span></div>
                                        <div className="flex gap-1"><span>I66</span> <span>대뇌동맥 폐쇄/협착</span></div>
                                        <div className="flex gap-1 col-span-2 font-bold text-red-600 border-t border-red-100 pt-1 mt-1">
                                            <Zap size={8} className="md:w-2.5 md:h-2.5" fill="currentColor" /> I67 기타 뇌혈관질환 (26.6%)
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-white p-5 md:p-6 rounded-3xl border border-slate-100 shadow-sm space-y-3 md:space-y-4 flex flex-col">
                                <div className="flex justify-between items-center border-b pb-2">
                                    <h4 className="text-lg md:text-xl font-black text-slate-800 flex items-center gap-2">
                                        <Heart size={20} className="text-red-500 md:w-6 md:h-6" /> 허혈성심장질환
                                    </h4>
                                    <span className="text-[8px] md:text-xs font-bold text-slate-400 uppercase tracking-widest">Heart Disease Codes</span>
                                </div>
                                <div className="space-y-2 flex-1">
                                    <div className="p-2 md:p-3 bg-slate-900 text-white rounded-xl flex justify-between items-center shadow-md">
                                        <span className="font-bold text-xs md:text-base">허혈성심장질환 전체</span>
                                        <span className="bg-blue-600 px-2 py-0.5 rounded text-[10px] md:text-xs font-black">100%</span>
                                    </div>
                                    <div className="ml-2 md:ml-4 p-2 md:p-3 bg-red-50 border border-red-100 rounded-xl flex justify-between items-center">
                                        <span className="font-bold text-red-700 text-xs md:text-base">급성심근경색증</span>
                                        <span className="text-red-600 font-bold text-xs md:text-base">11.8%</span>
                                    </div>
                                    <div className="mt-3 md:mt-4 space-y-1.5 text-[9px] md:text-[10px] text-slate-500 bg-slate-50 p-3 md:p-4 rounded-2xl border border-slate-100">
                                        <div className="flex gap-2"><span>I21</span> <span>급성 심근경색증</span></div>
                                        <div className="flex gap-2"><span>I22</span> <span>속발성 심근경색증</span></div>
                                        <div className="flex gap-2 font-bold text-red-600 text-[10px] md:text-xs py-1 border-y border-red-100 my-1">
                                            <Zap size={10} className="md:w-3 md:h-3" fill="currentColor" /> I20 협심증 (67.4%) - 핵심 공백
                                        </div>
                                        <div className="flex gap-2"><span>I24</span> <span>기타 급성 허혈성 심장질환</span></div>
                                        <div className="flex gap-2"><span>I25</span> <span>만성 허혈성 심장병 (20.3%)</span></div>
                                    </div>
                                </div>
                            </div>
                            <div className="lg:col-span-2 bg-gradient-to-r from-blue-600 to-blue-700 text-white p-5 md:p-6 rounded-[2rem] shadow-lg flex flex-col md:flex-row gap-4 md:gap-6 items-center">
                                <div className="flex-1 space-y-2">
                                    <h5 className="font-bold text-blue-100 flex items-center gap-2 text-sm md:text-base">
                                        <ShieldCheck size={18} className="md:w-5 md:h-5" /> 지급 예시 (중복 합산 지급)
                                    </h5>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-1 text-[10px] md:text-xs opacity-90">
                                        <p>• <strong>I61 뇌출혈:</strong> 뇌출혈 + 뇌졸중 + 뇌혈관진단비</p>
                                        <p>• <strong>I63 뇌경색:</strong> 뇌졸중 + 뇌혈관진단비</p>
                                        <p>• <strong>I21 급성심근경색:</strong> 급성심근경색 + 허혈성진단비</p>

                                <ChevronLeft size={20} className="md:w-7 md:h-7" strokeWidth={3} />
                            </button>
                            <button
                                onClick={nextSlide}
                                disabled={currentSlide === slides.length - 1}
                                className={cn(
                                    "p-3 md:p-5 rounded-xl md:rounded-2xl transition-all shadow-lg",
                                    currentSlide === slides.length - 1 
                                        ? "bg-slate-100 text-slate-300 cursor-not-allowed" 
                                        : "bg-slate-900 text-white hover:bg-blue-600 hover:scale-110 active:scale-95"
                                )}
                            >
                                <ChevronRight size={20} className="md:w-7 md:h-7" strokeWidth={3} />
                            </button>
                        </div>
                        
                        <div className="hidden lg:flex gap-3">
                            {slides.map((_, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => {
                                        setDirection(idx > currentSlide ? 1 : -1);
                                        setCurrentSlide(idx);
                                    }}
                                    className={cn(
                                        "h-2 rounded-full transition-all",
                                        currentSlide === idx ? "bg-blue-600 w-12" : "bg-slate-200 w-4 hover:bg-slate-300"
                                    )}
                                />
                            ))}
                        </div>

                        <div className="flex items-center gap-2 text-slate-400">
                            <Info size={16} />
                            <span className="text-xs font-bold uppercase tracking-widest">Data Verified by Statistics Korea</span>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
